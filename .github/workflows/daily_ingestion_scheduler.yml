name: FundIQ Daily Ingestion & RAG Corpus Scheduler

on:
  schedule:
    # Runs every day at 20:00 UTC (01:30 AM IST daily AMC sync)
    - cron: '0 20 * * *'
  workflow_dispatch: # Allows manual 1-click execution from GitHub Actions UI

permissions:
  contents: write

jobs:
  daily-ingestion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ingestion Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Automated Corpus Ingestion & Parquet Export
        run: |
          echo "[SCHEDULER] Triggering daily ingestion engine..."
          python export_to_parquet.py
          echo "[SCHEDULER] Ingestion completed. Checking dataset status..."

      - name: Commit and Push Updated Corpus Parquet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/corpus_embeddings.parquet data/corpus.json
          if git diff --staged --quiet; then
            echo "[SCHEDULER] No changes detected in AMC corpus or embeddings. Dataset is up to date."
          else
            echo "[SCHEDULER] New data detected! Committing refreshed Parquet dataset to main..."
            git commit -m "chore(scheduler): automated daily refresh of AMC corpus and vector embeddings [skip ci]"
            git push origin main
            echo "[SCHEDULER] Push complete! Railway will auto-detect git commit and deploy zero-downtime update."
          fi
